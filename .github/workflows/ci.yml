name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm content:generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: https://fortheopen.dev